name: Publish to PyPI

on:
  release:
    types: [published] # This pipeline ONLY runs when you publish a GitHub Release

jobs:
  pypi-publish:
    name: Build and publish Python distribution
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/swarm-kit

    permissions:
      id-token: write # IMPORTANT: This is the cryptographic key PyPI requires
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build the wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
